<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense | ExpenseTrckr</title>
    <link rel="stylesheet" href="{{url_for('static',path='css/create-expense.css')}}">
</head>
<body>

<nav class="navbar">
    <h1>ExpenseTrckr</h1>

    <a href="/expenses/expenses-page" class="back-btn">
        ← Back
    </a>
</nav>

<main class="container">

    <div class="form-card">

        <h2>Add New Expense</h2>
        <p class="subtitle">Keep track of every naira you spend.</p>

        <form id="addExpenseForm">

            <div class="form-group">
                <label for="title">Expense Title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="e.g. Lunch"
                    required
                >
            </div>

            <div class="form-group">
                <label for="amount">Amount (₦)</label>
                <input
                    type="number"
                    id="amount"
                    name="amount"
                    min="0"
                    step="0.01"
                    placeholder="0.00"
                    required
                >
            </div>

            <button type="submit" class="submit-btn">
                + Add Expense
            </button>

        </form>

    </div>

</main>

<script src="{{ url_for('static', path='js/base.js') }}"></script>

</body>
</html>
